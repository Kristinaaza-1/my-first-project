<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Джусти Кристина</title>
<style>
  :root {
    --bg: #0a0a0a;
    --accent1: #ff6ec4;
    --accent2: #7873f5;
    --accent3: #4facfe;
    --text-muted: #a0a0a8;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: #f5f5f5;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
    padding: 24px;
  }

  /* Фоновые декоративные размытые пятна */
  .bg-glow {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .bg-glow span {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.35;
    animation: float 16s ease-in-out infinite;
  }

  .bg-glow span:nth-child(1) {
    width: 420px;
    height: 420px;
    background: var(--accent1);
    top: -120px;
    left: -100px;
    animation-delay: 0s;
  }

  .bg-glow span:nth-child(2) {
    width: 380px;
    height: 380px;
    background: var(--accent2);
    bottom: -140px;
    right: -100px;
    animation-delay: 4s;
  }

  .bg-glow span:nth-child(3) {
    width: 300px;
    height: 300px;
    background: var(--accent3);
    top: 40%;
    left: 60%;
    animation-delay: 8s;
    opacity: 0.2;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(40px, -30px) scale(1.1); }
  }

  .card {
    position: relative;
    z-index: 1;
    max-width: 560px;
    width: 100%;
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: 56px 44px;
    backdrop-filter: blur(14px);
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(28px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 96px;
    height: 96px;
    margin: 0 auto 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 700;
    color: #0a0a0a;
    background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
    box-shadow: 0 0 0 4px rgba(255,255,255,0.06), 0 0 40px rgba(255,110,196,0.35);
    user-select: none;
  }

  .name {
    font-size: clamp(2rem, 6vw, 2.9rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3), var(--accent1));
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shine 6s linear infinite;
    filter: drop-shadow(0 0 22px rgba(120, 115, 245, 0.45));
    line-height: 1.15;
    margin-bottom: 14px;
  }

  @keyframes shine {
    to { background-position: 300% center; }
  }

  .role {
    display: inline-block;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent1);
    background: rgba(255,110,196,0.1);
    border: 1px solid rgba(255,110,196,0.3);
    padding: 6px 16px;
    border-radius: 999px;
    margin-bottom: 22px;
  }

  .bio {
    font-size: 1rem;
    line-height: 1.65;
    color: var(--text-muted);
    max-width: 460px;
    margin: 0 auto 32px;
  }

  .divider {
    width: 60px;
    height: 3px;
    margin: 0 auto 32px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent1), var(--accent3));
  }

  .socials {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 36px;
  }

  .socials a {
    position: relative;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    color: #f5f5f5;
    text-decoration: none;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .socials a svg {
    width: 24px;
    height: 24px;
    position: relative;
    z-index: 1;
    transition: transform 0.3s ease;
  }

  .socials a:hover {
    transform: translateY(-6px) scale(1.06);
    border-color: transparent;
    box-shadow: 0 12px 28px rgba(120, 115, 245, 0.35);
  }

  .socials a:hover svg {
    transform: scale(1.1);
  }

  .socials a.telegram:hover {
    background: linear-gradient(135deg, #4facfe, #7873f5);
  }

  .socials a::after {
    content: attr(data-label);
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    color: var(--text-muted);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s ease, bottom 0.3s ease;
    pointer-events: none;
  }

  .socials a:hover::after {
    opacity: 1;
    bottom: -26px;
  }

  .cta {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 38px;
    font-size: 1rem;
    font-weight: 600;
    color: #0a0a0a;
    text-decoration: none;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
    background-size: 200% auto;
    overflow: hidden;
    isolation: isolate;
    transition: background-position 0.5s ease, transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow: 0 8px 24px rgba(120, 115, 245, 0.35);
  }

  .cta svg {
    width: 20px;
    height: 20px;
    position: relative;
    z-index: 1;
    transition: transform 0.3s ease;
  }

  .cta span {
    position: relative;
    z-index: 1;
  }

  .cta::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 0;
    background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.55), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .cta:hover {
    background-position: 100% center;
    transform: translateY(-3px);
    box-shadow: 0 14px 34px rgba(255, 110, 196, 0.45);
  }

  .cta:hover::before {
    opacity: 1;
  }

  .cta:hover svg {
    transform: translateX(4px) rotate(6deg);
  }

  .cta:active {
    transform: translateY(-1px) scale(0.98);
  }

  .footer-note {
    margin-top: 28px;
    font-size: 0.75rem;
    color: #555;
    letter-spacing: 0.04em;
  }

  @media (max-width: 480px) {
    .card {
      padding: 40px 24px;
      border-radius: 22px;
    }
    .bio {
      font-size: 0.92rem;
    }
    .socials a {
      width: 48px;
      height: 48px;
    }
    .cta {
      width: 100%;
      justify-content: center;
      padding: 15px 20px;
    }
  }
</style>
</head>
<body>

  <div class="bg-glow">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <main class="card">
    <div class="avatar">ДК</div>

    <h1 class="name">Джусти Кристина</h1>
    <div class="role">Архитектор возможностей для beauty-индустрии</div>

    <p class="bio">
      Предприниматель с 20-летним опытом в beauty-индустрии. Изучаю ИИ,
      создаю цифровые решения для экспертов и организую международные
      профессиональные проекты
    </p>

    <div class="divider"></div>

    <div class="socials">
      <a class="telegram" href="https://t.me/kris_giu" target="_blank" rel="noopener noreferrer" data-label="Telegram">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M21.5 4.5L2.9 11.7c-1.2.5-1.2 1.2-.2 1.5l4.8 1.5 1.8 5.7c.2.6.4.8.8.8.4 0 .6-.2.8-.5l2.2-2.1 4.6 3.4c.8.5 1.4.2 1.6-.7l3-14.1c.3-1.2-.5-1.7-1.8-1.2z" fill="currentColor"/>
        </svg>
      </a>
    </div>

    <a class="cta" href="https://t.me/kris_giu" target="_blank" rel="noopener noreferrer" id="ctaBtn">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Написать мне</span>
    </a>

    <p class="footer-note">Открыта к новым проектам и сотрудничеству</p>
  </main>

  <script>
    const cta = document.getElementById('ctaBtn');
    cta.addEventListener('mousemove', (e) => {
      const rect = cta.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      cta.style.setProperty('--x', x + '%');
      cta.style.setProperty('--y', y + '%');
    });
  </script>

</body>
</html>
